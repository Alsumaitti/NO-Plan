kind = "web"
previewPath = "/"
title = "متتبع الإزالة — ما لن أفعله"
version = "1.0.0"
id = "artifacts/remover-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18524

[services.development]
run = "pnpm --filter @workspace/remover-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/remover-tracker", "run", "build" ]
publicDir = "artifacts/remover-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18524"
BASE_PATH = "/"
